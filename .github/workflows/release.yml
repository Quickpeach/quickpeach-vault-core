name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Verify and package only; no tag, no release, no publish
        required: false
        default: true
        type: boolean
      crates_io_ready_override:
        description: Override CRATES_IO_READY for this run ("" = use env default)
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "true"
          - "false"

# ─────────────────────────────────────────────────────────────────────────────
# All knobs live here. Edit this block to reconfigure the workflow — nothing
# below this block should be hardcoded.
# ─────────────────────────────────────────────────────────────────────────────
env:
  # Crate identity
  CRATE_NAME: peachnote-vault-core

  # Git / release shape
  RELEASE_BRANCH: main
  TAG_PREFIX: v
  FALLBACK_VERSION: "0.1.0"   # used only if no git tag and no crates.io publish exist

  # Bootstrap toggle:
  #   "false" → tag + GitHub release only, skip crates.io publish (pre-bootstrap)
  #   "true"  → also publish to crates.io via OIDC Trusted Publishing
  CRATES_IO_READY: "false"

  # Bot identity for the version-bump commit
  BOT_NAME: "github-actions[bot]"
  BOT_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"

  # Quality gates (set to "false" to skip)
  RUN_FMT: "true"
  RUN_CLIPPY: "true"
  RUN_TESTS: "true"
  RUN_FUZZ_CHECK: "true"
  FUZZ_MANIFEST: "fuzz/Cargo.toml"

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Resolve effective config
        id: cfg
        shell: bash
        run: |
          # Effective CRATES_IO_READY: workflow_dispatch input wins over env default.
          OVERRIDE="${{ inputs.crates_io_ready_override }}"
          if [[ -n "${OVERRIDE}" ]]; then
            EFFECTIVE_READY="${OVERRIDE}"
          else
            EFFECTIVE_READY="${CRATES_IO_READY}"
          fi

          # Dry run only applies to workflow_dispatch
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DRY_RUN="${{ inputs.dry_run }}"
          else
            DRY_RUN="false"
          fi

          echo "crates_io_ready=${EFFECTIVE_READY}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"

          {
            echo "### Release config"
            echo ""
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| crate | \`${CRATE_NAME}\` |"
            echo "| branch | \`${RELEASE_BRANCH}\` |"
            echo "| tag prefix | \`${TAG_PREFIX}\` |"
            echo "| CRATES_IO_READY | \`${EFFECTIVE_READY}\` |"
            echo "| dry run | \`${DRY_RUN}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Resolve next patch version
        id: version
        shell: bash
        run: |
          # Baseline preference: latest matching git tag → crates.io published → Cargo.toml → FALLBACK_VERSION
          LAST_TAG="$(git tag --list "${TAG_PREFIX}*" --sort=-version:refname | head -n1)"
          if [[ -n "${LAST_TAG}" ]]; then
            BASELINE="${LAST_TAG#${TAG_PREFIX}}"
            BUMP="patch"
          else
            BASELINE="$(python - <<'PY'
          import json, os, urllib.error, urllib.request
          crate = os.environ["CRATE_NAME"]
          url = f"https://crates.io/api/v1/crates/{crate}"
          req = urllib.request.Request(url, headers={"User-Agent": f"github-actions/{crate}"})
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.load(r)
              print(data.get("crate", {}).get("max_stable_version") or data.get("crate", {}).get("newest_version") or "")
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print("")
              else:
                  raise
          PY
            )"
            if [[ -n "${BASELINE}" ]]; then
              BUMP="patch"
            else
              BASELINE="$(python - <<'PY'
          import os, pathlib, re
          text = pathlib.Path("Cargo.toml").read_text(encoding="utf-8")
          m = re.search(r'(?:^|\n)\[package\][\s\S]*?\nversion = "([^"]+)"', text)
          print(m.group(1) if m else os.environ["FALLBACK_VERSION"])
          PY
              )"
              BUMP="none"
            fi
          fi

          if [[ "${BUMP}" == "patch" ]]; then
            IFS='.' read -r major minor patch <<< "${BASELINE}"
            NEXT="${major}.${minor}.$((patch + 1))"
          else
            NEXT="${BASELINE}"
          fi

          RELEASE_TAG="${TAG_PREFIX}${NEXT}"

          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${RELEASE_TAG} already exists — nothing to release."
            exit 1
          fi

          echo "release_version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}"   >> "$GITHUB_OUTPUT"
          echo "baseline=${BASELINE}"         >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}"                 >> "$GITHUB_OUTPUT"

      - name: Update version in Cargo.toml
        shell: bash
        run: |
          export RELEASE_VERSION="${{ steps.version.outputs.release_version }}"
          python - <<'PY'
          import os, pathlib, re
          path = pathlib.Path("Cargo.toml")
          text = path.read_text(encoding="utf-8")
          text, n = re.subn(
              r'((?:^|\n)\[package\][\s\S]*?\nversion = ")([^"]+)(")',
              rf'\g<1>{os.environ["RELEASE_VERSION"]}\3',
              text, count=1,
          )
          if n != 1: raise SystemExit("Could not update version in Cargo.toml")
          path.write_text(text, encoding="utf-8")
          PY

      - name: Fix formatting
        if: env.RUN_FMT == 'true'
        run: cargo fmt --all

      - name: Fix lint
        if: env.RUN_CLIPPY == 'true'
        run: cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features

      - name: Test
        if: env.RUN_TESTS == 'true'
        run: cargo test

      - name: Check fuzz targets compile
        if: env.RUN_FUZZ_CHECK == 'true'
        run: cargo check --manifest-path "${FUZZ_MANIFEST}"

      - name: Package crate
        run: cargo package --allow-dirty

      # ─── Dry-run path ───────────────────────────────────────────────────────
      - name: Dry-run summary
        if: steps.cfg.outputs.dry_run == 'true'
        shell: bash
        run: |
          {
            echo ""
            echo "### Dry run"
            echo ""
            echo "Packaged \`${CRATE_NAME}\` ${{ steps.version.outputs.release_version }}. Nothing tagged, released, or published."
          } >> "$GITHUB_STEP_SUMMARY"

      # ─── Real-release path: tag + GitHub release ALWAYS run ─────────────────
      - name: Commit version bump and push tag
        if: steps.cfg.outputs.dry_run != 'true'
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          git config user.name  "${BOT_NAME}"
          git config user.email "${BOT_EMAIL}"
          git add Cargo.toml
          git add -u  # pick up files touched by fmt/clippy --fix
          if ! git diff --cached --quiet; then
            git commit -m "release: ${RELEASE_TAG} [skip release]"
            git push origin "HEAD:${RELEASE_BRANCH}"
          fi
          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release
        if: steps.cfg.outputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name:     ${{ steps.version.outputs.release_tag }}
          generate_release_notes: true

      # ─── crates.io path: only when bootstrap is complete ────────────────────
      - name: Authenticate with crates.io
        if: steps.cfg.outputs.dry_run != 'true' && steps.cfg.outputs.crates_io_ready == 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        if: steps.cfg.outputs.dry_run != 'true' && steps.cfg.outputs.crates_io_ready == 'true'
        run: cargo publish --allow-dirty --token "${{ steps.auth.outputs.token }}"

      # ─── Pre-bootstrap notice ───────────────────────────────────────────────
      - name: Bootstrap notice (CRATES_IO_READY=false)
        if: steps.cfg.outputs.dry_run != 'true' && steps.cfg.outputs.crates_io_ready != 'true'
        shell: bash
        run: |
          {
            echo ""
            echo "### crates.io publish skipped (pre-bootstrap)"
            echo ""
            echo "\`CRATES_IO_READY\` is **false**. Tag \`${{ steps.version.outputs.release_tag }}\` and the GitHub release were created so git-based consumers can pin to it, but the crate was **not** published to crates.io."
            echo ""
            echo "**Manual bootstrap steps:**"
            echo "1. Create a token at https://crates.io/settings/tokens scoped to \`${CRATE_NAME}\`."
            echo "2. Run \`cargo publish --token <TOKEN>\` locally to do the first publish."
            echo "3. On https://crates.io/crates/${CRATE_NAME}/settings → Trusted Publishing, add a GitHub publisher with workflow \`release.yml\`."
            echo "4. Flip \`CRATES_IO_READY: \"true\"\` in \`.github/workflows/release.yml\`."
          } >> "$GITHUB_STEP_SUMMARY"
