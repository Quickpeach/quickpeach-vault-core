name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Verify and package only; do not publish to crates.io or push a tag
        required: false
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Resolve next patch version
        id: version
        shell: bash
        run: |
          export CRATE_NAME="peachnote-vault-core"

          # Prefer last git tag; fall back to latest published on crates.io
          LAST_TAG="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          if [[ -n "${LAST_TAG}" ]]; then
            BASELINE="${LAST_TAG#v}"
          else
            BASELINE="$(python - <<'PY'
          import json, os, urllib.error, urllib.request
          crate = os.environ["CRATE_NAME"]
          url = f"https://crates.io/api/v1/crates/{crate}"
          req = urllib.request.Request(url, headers={"User-Agent": "github-actions/quickpeach-vault-core"})
          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.load(r)
              print(data.get("crate", {}).get("max_stable_version") or data.get("crate", {}).get("newest_version") or "")
          except urllib.error.HTTPError as e:
              print("") if e.code == 404 else (_ for _ in ()).throw(e)
          PY
            )"
          fi

          if [[ -z "${BASELINE}" ]]; then
            # No prior release found — use the version already in Cargo.toml
            BASELINE="$(python - <<'PY'
          import pathlib, re
          text = pathlib.Path("Cargo.toml").read_text(encoding="utf-8")
          m = re.search(r'(?:^|\n)\[package\][\s\S]*?\nversion = "([^"]+)"', text)
          if not m: raise SystemExit("Could not read version from Cargo.toml")
          print(m.group(1))
          PY
            )"
            NEXT="${BASELINE}"
          else
            IFS='.' read -r major minor patch <<< "${BASELINE}"
            NEXT="${major}.${minor}.$((patch + 1))"
          fi

          RELEASE_TAG="v${NEXT}"

          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${RELEASE_TAG} already exists — nothing to release."
            exit 1
          fi

          echo "release_version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Update version in Cargo.toml
        shell: bash
        run: |
          export RELEASE_VERSION="${{ steps.version.outputs.release_version }}"
          python - <<'PY'
          import os, pathlib, re
          path = pathlib.Path("Cargo.toml")
          text = path.read_text(encoding="utf-8")
          text, n = re.subn(
              r'((?:^|\n)\[package\][\s\S]*?\nversion = ")([^"]+)(")',
              rf'\g<1>{os.environ["RELEASE_VERSION"]}\3',
              text, count=1,
          )
          if n != 1: raise SystemExit("Could not update version in Cargo.toml")
          path.write_text(text, encoding="utf-8")
          PY

      - name: Fix formatting
        run: cargo fmt --all

      - name: Fix lint
        run: cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features

      - name: Test
        run: cargo test

      - name: Check fuzz targets compile
        run: cargo check --manifest-path fuzz/Cargo.toml

      - name: Package crate
        run: cargo package --allow-dirty

      - name: Dry run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        run: |
          echo "Dry run — peachnote-vault-core ${{ steps.version.outputs.release_version }} packaged OK. Nothing published." >> "$GITHUB_STEP_SUMMARY"

      - name: Authenticate with crates.io
        if: github.event_name == 'push' || inputs.dry_run != true
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        if: github.event_name == 'push' || inputs.dry_run != true
        run: cargo publish --allow-dirty --token "${{ steps.auth.outputs.token }}"

      - name: Commit version bump and push tag
        if: github.event_name == 'push' || inputs.dry_run != true
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          git add -u  # pick up any files touched by fmt/clippy --fix
          if ! git diff --cached --quiet; then
            git commit -m "release: ${RELEASE_TAG} [skip release]"
            git push origin HEAD:main
          fi
          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release
        if: github.event_name == 'push' || inputs.dry_run != true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          generate_release_notes: true
