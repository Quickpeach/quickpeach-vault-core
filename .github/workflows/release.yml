name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Verify and package only; do not publish to crates.io or push a tag
        required: false
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          CRATE_NAME="peachnote-vault-core"
          LAST_TAG="$(git tag --list 'v*' --sort=-version:refname | head -n1)"
          LATEST_PUBLISHED="$(python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          crate_name = os.environ["CRATE_NAME"]
          url = f"https://crates.io/api/v1/crates/{crate_name}"
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  data = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print("")
              else:
                  raise
          else:
              version = data.get("crate", {}).get("max_stable_version") or data.get("crate", {}).get("newest_version") or ""
              print(version)
          PY
          )"

          if [[ -n "${LAST_TAG}" ]]; then
            BASELINE_VERSION="${LAST_TAG#v}"
          elif [[ -n "${LATEST_PUBLISHED}" ]]; then
            BASELINE_VERSION="${LATEST_PUBLISHED}"
          else
            echo "::error::Trusted publishing requires a one-time manual crates.io release before this workflow can auto-publish."
            exit 1
          fi

          if [[ ! "${BASELINE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Baseline version ${BASELINE_VERSION} is not strict semver"
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "${BASELINE_VERSION}"
          RELEASE_VERSION="${major}.${minor}.$((patch + 1))"

          RELEASE_TAG="v${RELEASE_VERSION}"

          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${RELEASE_TAG} already exists."
            exit 1
          fi

      - name: Update crate version in Cargo.toml
        shell: bash
        run: |
          RELEASE_VERSION="${{ steps.version.outputs.release_version }}"
          python - <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path("Cargo.toml")
          text = path.read_text(encoding="utf-8")
          text, count = re.subn(
              r'(^|\n)(\[package\][\s\S]*?\nversion = ")([^"]+)(")',
              rf'\1\2{os.environ["RELEASE_VERSION"]}\4',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("Could not update package version in Cargo.toml")
          path.write_text(text, encoding="utf-8")
          PY

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

      - name: Check fuzz targets compile
        run: cargo check --manifest-path fuzz/Cargo.toml

      - name: Package crate
        run: cargo package --allow-dirty

      - name: Dry run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == true
        shell: bash
        run: |
          RELEASE_VERSION="${{ steps.version.outputs.release_version }}"
          echo "Prepared peachnote-vault-core ${RELEASE_VERSION} successfully." >> "$GITHUB_STEP_SUMMARY"
          echo "Dry run mode is active, so nothing was published or pushed." >> "$GITHUB_STEP_SUMMARY"

      - name: Authenticate with crates.io
        if: github.event_name == 'push' || inputs.dry_run != true
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        if: github.event_name == 'push' || inputs.dry_run != true
        run: cargo publish --allow-dirty --token "${{ steps.auth.outputs.token }}"

      - name: Commit version bump and push tag
        if: github.event_name == 'push' || inputs.dry_run != true
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.version.outputs.release_tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          if ! git diff --cached --quiet; then
            git commit -m "release: ${RELEASE_TAG} [skip release]"
            git push origin HEAD:main
          fi
          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release
        if: github.event_name == 'push' || inputs.dry_run != true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          generate_release_notes: true
